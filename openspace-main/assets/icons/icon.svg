<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#020002"/>
  <!-- Grid background -->
  <g stroke="rgba(255,0,60,0.1)" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Triangle symbol -->
  <polygon points="256,80 420,400 92,400" fill="none" stroke="#ff003c" stroke-width="8"/>
  <polygon points="256,140 380,370 132,370" fill="none" stroke="rgba(255,0,60,0.3)" stroke-width="4"/>
  <!-- Eye / AI symbol in center -->
  <circle cx="256" cy="280" r="50" fill="none" stroke="#00f3ff" stroke-width="4"/>
  <circle cx="256" cy="280" r="20" fill="#ff003c"/>
  <circle cx="256" cy="280" r="8" fill="#020002"/>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" letter-spacing="8">AI</text>
</svg>
