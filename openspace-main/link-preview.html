<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連結 UI 方案預覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── Design Tokens ── */
        :root {
            --color-blood-red: #ff003c;
            --color-cyber-cyan: #00f3ff;
            --color-online-green: #00ff66;
            --color-bg-void: #020002;
            --color-text-primary: #ffffff;
            --color-text-secondary: rgba(255, 255, 255, 0.7);

            --font-ui: 'Oswald', sans-serif;
            --font-mono: 'Courier New', monospace;

            --shadow-glow-cyan: 0 0 20px rgba(0, 243, 255, 0.3);
            --shadow-glow-red: 0 0 20px rgba(255, 0, 60, 0.3);
            --shadow-glow-green: 0 0 20px rgba(0, 255, 102, 0.3);

            --duration-fast: 150ms;
        }

        /* ── 基礎重置與背景 ── */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--color-bg-void);
            /* 全域背景紋理 */
            background-image:
                linear-gradient(rgba(255, 0, 60, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 60, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--color-text-primary);
            font-family: var(--font-ui);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        h1 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 2px 2px 0px #000, -1px -1px 0 var(--color-blood-red);
            margin-bottom: 20px;
        }

        .proposal-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .proposal-title {
            font-family: var(--font-mono);
            color: var(--color-text-secondary);
            font-size: 14px;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        /* ========================================= */
        /* 方案 A: 矩陣全息面板 (Holographic Panel)  */
        /* ========================================= */
        .link-card-a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--color-cyber-cyan);
            box-shadow: var(--shadow-glow-cyan);
            color: var(--color-cyber-cyan);
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            /* 賽博龐克斜切角 */
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .link-card-a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 243, 255, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1;
        }

        .link-card-a::after {
            content: 'SYS.LINK_ACTIVE';
            position: absolute;
            bottom: 2px;
            right: 20px;
            font-family: var(--font-mono);
            font-size: 8px;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .link-card-a svg {
            z-index: 2;
            flex-shrink: 0;
        }

        .link-card-a span {
            z-index: 2;
            font-weight: 500;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .link-card-a:hover {
            background: rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
            text-shadow: 0 0 8px var(--color-cyber-cyan);
        }

        /* ========================================= */
        /* 方案 B: 血紅警告封條 (Blood Warning)      */
        /* ========================================= */
        .link-card-b {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: rgba(26, 0, 5, 0.8);
            border-left: 4px solid var(--color-blood-red);
            color: var(--color-text-primary);
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
        }

        .link-card-b svg {
            color: var(--color-blood-red);
            filter: drop-shadow(0 0 5px var(--color-blood-red));
        }

        .link-card-b span {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 右上與右下的裝飾角 */
        .link-card-b::before,
        .link-card-b::after {
            content: '';
            position: absolute;
            right: 0;
            width: 10px;
            height: 10px;
            border-right: 2px solid var(--color-blood-red);
            opacity: 0.5;
            transition: all 0.3s;
        }

        .link-card-b::before {
            top: 0;
            border-top: 2px solid var(--color-blood-red);
        }

        .link-card-b::after {
            bottom: 0;
            border-bottom: 2px solid var(--color-blood-red);
        }

        .link-card-b:hover {
            background: rgba(255, 0, 60, 0.15);
            padding-left: 28px;
            box-shadow: inset 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .link-card-b:hover svg {
            transform: scale(1.1);
        }

        .link-card-b:hover::before,
        .link-card-b:hover::after {
            opacity: 1;
            width: 15px;
            height: 15px;
        }

        /* ========================================= */
        /* 方案 C: 矩陣通行證 (Matrix Access Pass)   */
        /* ========================================= */
        .link-card-c {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-radius: 4px;
            color: var(--color-text-secondary);
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .link-card-c .content-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 2;
        }

        .link-card-c svg {
            opacity: 0.7;
            transition: all 0.3s;
        }

        .link-card-c span {
            font-weight: 500;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* 脈衝綠燈指示器 */
        .link-card-c .status-light {
            width: 8px;
            height: 8px;
            background-color: var(--color-online-green);
            border-radius: 50%;
            box-shadow: var(--shadow-glow-green);
            animation: pulse-green 1.5s infinite alternate;
            z-index: 2;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 5px rgba(0, 255, 102, 0.3);
                opacity: 0.5;
            }

            100% {
                box-shadow: 0 0 15px rgba(0, 255, 102, 0.8);
                opacity: 1;
            }
        }

        .link-card-c:hover {
            border-color: var(--color-online-green);
            background: rgba(0, 255, 102, 0.05);
            color: var(--color-online-green);
            transform: scale(1.02);
        }

        .link-card-c:hover svg {
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--color-online-green));
        }
    </style>
</head>

<body>

    <h1>LINK UI PROPOSALS</h1>

    <!-- 原本的樣子 (當作對照) -->

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>

        <a href="#" target="_blank" rel="noopener noreferrer" class="link-card-b">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

    </div>
