<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI末日議會 — 登入</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff003c">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Preconnect：提前建立外部連線 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Fonts（display=swap 避免 FOIT） -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Design System -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/atoms.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/layouts.css">
    <link rel="stylesheet" href="css/utilities.css">

    <style>
        /* ── 登入頁專屬裝飾 ── */
        .auth-bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* 浮動粒子 */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--color-blood-red);
            border-radius: 50%;
            opacity: 0;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.2;
            }

            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1);
            }
        }

        /* 登入卡片 */
        .auth-card {
            background: var(--color-bg-surface);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            position: relative;
            box-shadow: var(--shadow-vignette), var(--shadow-glow-red);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(255, 0, 60, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 四角裝飾（卡片版） */
        .auth-card .corner {
            position: absolute;
            width: 12px;
            height: 12px;
        }

        .auth-card .corner--tl {
            top: -1px;
            left: -1px;
            border-top: 2px solid var(--color-blood-red);
            border-left: 2px solid var(--color-blood-red);
        }

        .auth-card .corner--tr {
            top: -1px;
            right: -1px;
            border-top: 2px solid var(--color-blood-red);
            border-right: 2px solid var(--color-blood-red);
        }

        .auth-card .corner--bl {
            bottom: -1px;
            left: -1px;
            border-bottom: 2px solid var(--color-blood-red);
            border-left: 2px solid var(--color-blood-red);
        }

        .auth-card .corner--br {
            bottom: -1px;
            right: -1px;
            border-bottom: 2px solid var(--color-blood-red);
            border-right: 2px solid var(--color-blood-red);
        }

        /* Logo 區域 */
        .auth-logo {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .auth-logo__title {
            font-family: var(--font-display);
            font-size: var(--text-4xl);
            letter-spacing: var(--tracking-widest);
            line-height: var(--leading-tight);
            margin-bottom: var(--space-2);
        }

        .auth-logo__subtitle {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            letter-spacing: var(--tracking-ultra);
            color: var(--color-cyber-cyan);
            animation: pulse-breathe 1.5s infinite alternate;
        }

        .auth-logo__date {
            font-family: var(--font-mono);
            font-size: var(--text-2xs);
            color: var(--color-text-muted);
            letter-spacing: var(--tracking-wider);
            margin-top: var(--space-2);
        }

        /* 表單欄位 */
        .form-field {
            margin-bottom: var(--space-4);
        }

        .form-field__label {
            display: block;
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
            margin-bottom: var(--space-2);
        }

        .form-field__error {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--color-error);
            margin-top: var(--space-1);
            display: none;
        }

        /* 分隔線裝飾 */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin: var(--space-6) 0;
        }

        .auth-divider__line {
            flex: 1;
            height: 1px;
            background: var(--color-border-default);
        }

        .auth-divider__text {
            font-family: var(--font-mono);
            font-size: var(--text-2xs);
            color: var(--color-text-muted);
            letter-spacing: var(--tracking-wider);
            text-transform: uppercase;
        }

        /* Google 登入按鈕 */
        .btn--google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            width: 100%;
            padding: var(--space-3) var(--space-4);
            background: transparent;
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: var(--font-ui);
            font-size: var(--text-sm);
            font-weight: var(--weight-bold);
            cursor: pointer;
            transition: all var(--duration-fast);
            letter-spacing: var(--tracking-wide);
        }

        .btn--google:hover {
            border-color: var(--color-cyber-cyan);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.2);
            background: rgba(0, 243, 255, 0.05);
        }

        .btn--google:active {
            transform: scale(0.98);
        }

        .btn--google svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* 底部連結 */
        .auth-footer {
            text-align: center;
            margin-top: var(--space-4);
        }

        .auth-footer__text {
            font-family: var(--font-ui);
            font-size: var(--text-sm);
            color: var(--color-text-muted);
        }

        .auth-footer__link {
            color: var(--color-cyber-cyan);
            cursor: pointer;
            font-weight: var(--weight-bold);
            transition: text-shadow var(--duration-fast);
        }

        .auth-footer__link:hover {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* 系統訊息 */
        .system-status {
            position: fixed;
            bottom: var(--space-4);
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-mono);
            font-size: var(--text-2xs);
            color: var(--color-text-muted);
            letter-spacing: var(--tracking-wide);
            opacity: 0.4;
            z-index: var(--z-base);
            white-space: nowrap;
        }

        /* 掃描線動畫 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--color-blood-red) 50%, transparent 100%);
            opacity: 0.3;
            z-index: 0;
            animation: scan-down 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan-down {
            0% {
                top: -2px;
            }

            100% {
                top: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- 背景裝飾：掃描線 -->
    <div class="scan-line"></div>

    <!-- 背景裝飾：浮動粒子 -->
    <div class="auth-bg-grid" id="particles"></div>

    <!-- 登入頁（AuthLayout） -->
    <section class="layout-auth">
        <div class="layout-auth__container page-enter">
            <!-- Logo -->
            <div class="auth-logo">
                <h1 class="auth-logo__title ui-text fx-text-glitch" data-text="AI末日議會">AI末日議會</h1>
                <div class="auth-logo__subtitle">末日議會</div>
                <div class="auth-logo__date">場次：3/28 // 19:00-24:00</div>
            </div>

            <!-- 登入卡片 -->
            <div class="auth-card">
                <div class="corner corner--tl"></div>
                <div class="corner corner--tr"></div>
                <div class="corner corner--bl"></div>
                <div class="corner corner--br"></div>

                <!-- 錯誤訊息 -->
                <div id="authError" class="form-field__error" style="display:none;text-align:center;margin-bottom:var(--space-4);font-size:var(--text-sm);"></div>

                <!-- 成功訊息 -->
                <div id="authSuccess" style="display:none;text-align:center;margin-bottom:var(--space-4);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--color-cyber-cyan);">
                    <div style="font-size:var(--text-2xl);margin-bottom:var(--space-2);">&#9993;</div>
                    <div style="color:var(--color-online-green);font-weight:bold;margin-bottom:var(--space-2);">驗證信已發送</div>
                    <div style="color:var(--color-text-secondary);font-size:var(--text-xs);line-height:1.6;">
                        請前往你的信箱點擊驗證連結<br>完成驗證後即可登入
                    </div>
                </div>

                <form id="authForm">
                    <div class="form-field">
                        <label class="form-field__label">電子信箱</label>
                        <input class="input" type="email" id="authEmail" placeholder="your@email.com" autocomplete="email" required>
                    </div>

                    <div class="form-field">
                        <label class="form-field__label">密碼</label>
                        <input class="input" type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password" required minlength="6">
                    </div>

                    <div class="form-field" id="confirmPasswordField" style="display:none;">
                        <label class="form-field__label">確認密碼</label>
                        <input class="input" type="password" id="authPasswordConfirm" placeholder="••••••••" autocomplete="new-password" minlength="6">
                        <div class="form-field__error" id="passwordMismatch">兩次輸入的密碼不一致</div>
                    </div>

                    <button type="submit" class="btn btn--primary btn--lg btn--full mt-4" id="authSubmitBtn">
                        登 入
                    </button>
                </form>

                <div class="auth-divider">
                    <div class="auth-divider__line"></div>
                    <span class="auth-divider__text">或</span>
                    <div class="auth-divider__line"></div>
                </div>

                <!-- Google OAuth 登入 -->
                <button type="button" class="btn--google" id="googleLoginBtn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    使用 Google 帳號登入
                </button>

                <div class="auth-footer">
                    <span class="auth-footer__text" id="authFooterText">
                        沒有帳號？
                        <span class="auth-footer__link" id="authToggle">立即註冊</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- 系統狀態 -->
        <div class="system-status">
            SYS.v1.0 // MATRIX_PROTOCOL_READY // NODE_COUNT: 0/100
        </div>
    </section>

    <!-- Service Worker 註冊 -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW:', err));
      }
    </script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // ── 粒子系統 ──
        const particleContainer = document.getElementById('particles');

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '-4px';
            p.style.animationDuration = (Math.random() * 6 + 4) + 's';
            p.style.animationDelay = Math.random() * 2 + 's';
            p.style.width = (Math.random() * 2 + 1) + 'px';
            p.style.height = p.style.width;

            const colors = ['var(--color-blood-red)', 'var(--color-cyber-cyan)', 'var(--color-cyber-magenta)'];
            p.style.background = colors[Math.floor(Math.random() * colors.length)];

            particleContainer.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }

        for (let i = 0; i < 15; i++) {
            setTimeout(createParticle, Math.random() * 3000);
        }
        setInterval(createParticle, 400);

        // ── 系統狀態文字循環 ──
        const statusEl = document.querySelector('.system-status');
        if (statusEl) {
            const msgs = [
                'SYS.v1.0 // MATRIX_PROTOCOL_READY // NODE_COUNT: 0/100',
                'SYS.v1.0 // SCANNING_PERIMETER... // THREAT_LEVEL: ████',
                'SYS.v1.0 // AWAITING_CONNECTIONS // STANDBY_MODE',
                'SYS.v1.0 // DOOMSDAY_CLOCK: 00:00:00 // ARMED',
                'SYS.v1.0 // SINGULARITY_INDEX: 0.97 // WARNING',
            ];
            let idx = 0;
            setInterval(() => {
                idx = (idx + 1) % msgs.length;
                statusEl.textContent = msgs[idx];
            }, 4000);
        }

        // ── 認證邏輯 ──
        let isLoginMode = true;
        const authForm = document.getElementById('authForm');
        const authEmail = document.getElementById('authEmail');
        const authPassword = document.getElementById('authPassword');
        const authPasswordConfirm = document.getElementById('authPasswordConfirm');
        const confirmPasswordField = document.getElementById('confirmPasswordField');
        const passwordMismatch = document.getElementById('passwordMismatch');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authToggle = document.getElementById('authToggle');
        const authFooterText = document.getElementById('authFooterText');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');

        // 已登入 → 直接跳轉（含 OAuth callback 處理）
        (async () => {
            // Supabase 會自動從 URL hash 解析 OAuth token 並建立 session
            const session = await Auth.getSession();
            if (session) window.location.href = 'index.html';
        })();

        function switchMode(toLogin) {
            isLoginMode = toLogin;
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
            passwordMismatch.style.display = 'none';
            authPasswordConfirm.value = '';

            if (isLoginMode) {
                authSubmitBtn.textContent = '登 入';
                confirmPasswordField.style.display = 'none';
                authPasswordConfirm.removeAttribute('required');
                authFooterText.innerHTML = '沒有帳號？<span class="auth-footer__link" id="authToggle">立即註冊</span>';
            } else {
                authSubmitBtn.textContent = '註 冊';
                confirmPasswordField.style.display = 'block';
                authPasswordConfirm.setAttribute('required', '');
                authFooterText.innerHTML = '已有帳號？<span class="auth-footer__link" id="authToggle">返回登入</span>';
            }
            document.getElementById('authToggle').addEventListener('click', () => switchMode(!isLoginMode));
        }

        // 切換登入/註冊
        authToggle.addEventListener('click', () => switchMode(!isLoginMode));

        // Google OAuth 登入
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        googleLoginBtn.addEventListener('click', async () => {
            googleLoginBtn.disabled = true;
            googleLoginBtn.textContent = '跳轉中...';
            try {
                await Auth.signInWithGoogle();
            } catch (err) {
                authError.textContent = err.message;
                authError.style.display = 'block';
                googleLoginBtn.disabled = false;
                googleLoginBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;flex-shrink:0">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg> 使用 Google 帳號登入`;
            }
        });

        // 表單提交
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.style.display = 'none';
            authSuccess.style.display = 'none';
            passwordMismatch.style.display = 'none';

            const email = authEmail.value.trim();
            const password = authPassword.value;

            if (!email || !password) return;

            // 註冊模式：檢查兩次密碼一致
            if (!isLoginMode) {
                if (password !== authPasswordConfirm.value) {
                    passwordMismatch.style.display = 'block';
                    return;
                }
            }

            // 禁用按鈕
            authSubmitBtn.disabled = true;
            authSubmitBtn.textContent = isLoginMode ? '登入中...' : '註冊中...';

            try {
                if (isLoginMode) {
                    await Auth.signIn(email, password);
                    window.location.href = 'index.html';
                } else {
                    await Auth.signUp(email, password);
                    // 隱藏表單，顯示驗證提示
                    authForm.style.display = 'none';
                    authSuccess.style.display = 'block';
                    // 切回登入模式（隱藏中）
                    isLoginMode = true;
                    confirmPasswordField.style.display = 'none';
                    authPasswordConfirm.removeAttribute('required');
                    authSubmitBtn.textContent = '登 入';
                    authFooterText.innerHTML = '已收到驗證信？<span class="auth-footer__link" id="authToggle">前往登入</span>';
                    document.getElementById('authToggle').addEventListener('click', () => {
                        authForm.style.display = 'block';
                        authSuccess.style.display = 'none';
                        switchMode(true);
                    });
                }
            } catch (err) {
                authError.textContent = _translateError(err.message);
                authError.style.display = 'block';
                authSubmitBtn.textContent = isLoginMode ? '登 入' : '註 冊';
            } finally {
                authSubmitBtn.disabled = false;
            }
        });

        // 錯誤訊息翻譯
        function _translateError(msg) {
            if (msg.includes('Invalid login credentials')) return '信箱或密碼錯誤';
            if (msg.includes('User already registered')) return '此信箱已註冊，請直接登入';
            if (msg.includes('Password should be at least')) return '密碼至少需要 6 個字元';
            if (msg.includes('Unable to validate email')) return '請輸入有效的 Email 地址';
            if (msg.includes('Email rate limit exceeded')) return '嘗試次數過多，請稍後再試';
            return msg;
        }
    </script>
</body>

</html>
