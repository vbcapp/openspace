<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI末日議會 — Doomsday Parliament</title>
    <meta name="description" content="AI末日議會 — 100 位議員的末日生存投票實驗。3/28 晚間限定，即時互動 WebApp。">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI末日議會 — Doomsday Parliament">
    <meta property="og:description" content="100 位議會代表的末日生存投票實驗。3/28 晚間限定，即時互動 WebApp。">
    <meta property="og:url" content="https://openspace.vibes.com.tw/">
    <meta property="og:image" content="https://openspace.vibes.com.tw/assets/icons/icon-512.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:site_name" content="AI末日議會">
    <meta property="og:locale" content="zh_TW">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="AI末日議會 — Doomsday Parliament">
    <meta name="twitter:description" content="100 位議會代表的末日生存投票實驗。3/28 晚間限定，即時互動 WebApp。">
    <meta name="twitter:image" content="https://openspace.vibes.com.tw/assets/icons/icon-512.png">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff003c">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Preconnect：提前建立外部連線 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Fonts（display=swap 避免 FOIT） -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Design System -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/atoms.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/layouts.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
</head>

<body>
    <!-- SPA 主容器 -->
    <div id="app"></div>

    <!-- 底部導覽列 -->
    <nav class="nav-bar" id="navBar" style="display:none;">
        <div class="nav-bar__item" data-route="profile">
            <svg class="nav-bar__icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            個人
        </div>
        <div class="nav-bar__item" data-route="matrix">
            <svg class="nav-bar__icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            矩陣
        </div>
        <div class="nav-bar__item" data-route="zones">
            <svg class="nav-bar__icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            題區
        </div>
    </nav>

    <!-- Service Worker 註冊 -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW:', err));
      }
    </script>

    <!-- Supabase SDK -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- QR Code Library -->
    <script defer src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- JS 模組 -->
    <script defer src="js/supabase.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/components/matrix-grid.js"></script>
    <script defer src="js/router.js"></script>
    <script defer src="js/pages/profile.js"></script>
    <script defer src="js/pages/matrix.js"></script>
    <script defer src="js/pages/vote.js"></script>
    <script defer src="js/pages/vote-result.js"></script>
    <script defer src="js/pages/player-card.js"></script>
    <script defer src="js/pages/zones.js"></script>
    <script defer src="js/pages/question-gen.js"></script>
    <script defer src="js/pages/answer.js"></script>
    <script defer src="js/pages/admin-members.js"></script>
    <script defer src="js/app.js"></script>
</body>

</html>
