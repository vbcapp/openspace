<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI末日議會 — 身份驗證</title>
</head>
<body style="margin:0;padding:0;background-color:#020002;font-family:'Courier New',monospace;">
  <!-- 背景容器 -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#020002;background-image:linear-gradient(rgba(255,0,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,0,60,0.03) 1px,transparent 1px);background-size:20px 20px;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- 主卡片 -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:rgba(10,0,0,0.95);border:1px solid rgba(255,0,60,0.25);border-radius:8px;overflow:hidden;">

          <!-- 頂部紅色掃描線裝飾 -->
          <tr>
            <td style="height:2px;background:linear-gradient(90deg,transparent 0%,#ff003c 50%,transparent 100%);"></td>
          </tr>

          <!-- 內容區域 -->
          <tr>
            <td style="padding:40px 32px;">

              <!-- Logo 區域 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:8px;">
                    <h1 style="margin:0;font-family:'Anton','Helvetica Neue',Arial,sans-serif;font-size:32px;color:#ffffff;letter-spacing:0.2em;text-shadow:2px 2px 0px #000,-1px -1px 0 #ff003c;">
                      AI末日議會
                    </h1>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-bottom:4px;">
                    <span style="font-family:'Courier New',monospace;font-size:10px;color:#00f3ff;letter-spacing:0.3em;text-transform:uppercase;">
                      DOOMSDAY PARLIAMENT
                    </span>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <span style="font-family:'Courier New',monospace;font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;">
                      SESSION: 3/28 // 19:00-24:00
                    </span>
                  </td>
                </tr>
              </table>

              <!-- 分隔線 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="height:1px;background:linear-gradient(90deg,transparent,rgba(255,0,60,0.3),transparent);"></td>
                </tr>
              </table>

              <!-- 訊息內容 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:28px 0 8px;">
                    <p style="margin:0;font-family:'Courier New',monospace;font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.15em;text-transform:uppercase;">
                      // IDENTITY_VERIFICATION_REQUIRED
                    </p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:8px 0 4px;">
                    <h2 style="margin:0;font-family:'Helvetica Neue',Arial,sans-serif;font-size:20px;color:#ffffff;font-weight:700;">
                      確認你的身份
                    </h2>
                  </td>
                </tr>
                <tr>
                  <td style="padding:8px 0 24px;">
                    <p style="margin:0;font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;">
                      你已成功提交加入議會的申請。<br>
                      點擊下方按鈕完成身份驗證，即可進入系統。
                    </p>
                  </td>
                </tr>
              </table>

              <!-- CTA 按鈕 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:8px 0 28px;">
                    <table role="presentation" cellpadding="0" cellspacing="0">
                      <tr>
                        <td align="center" style="background-color:#ff003c;border-radius:4px;box-shadow:0 0 20px rgba(255,0,60,0.3);">
                          <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 40px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;letter-spacing:0.15em;text-transform:uppercase;">
                            &#9889; 驗證身份
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- 分隔線 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="height:1px;background:linear-gradient(90deg,transparent,rgba(255,0,60,0.3),transparent);"></td>
                </tr>
              </table>

              <!-- 備用連結 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:20px 0 0;">
                    <p style="margin:0;font-family:'Courier New',monospace;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.05em;line-height:1.8;">
                      // 按鈕無法點擊？複製以下連結至瀏覽器：<br>
                      <a href="{{ .ConfirmationURL }}" style="color:#00f3ff;text-decoration:none;word-break:break-all;font-size:9px;">
                        {{ .ConfirmationURL }}
                      </a>
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- 底部紅色掃描線裝飾 -->
          <tr>
            <td style="height:2px;background:linear-gradient(90deg,transparent 0%,#ff003c 50%,transparent 100%);"></td>
          </tr>

        </table>

        <!-- Footer -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">
          <tr>
            <td align="center" style="padding:24px 0 8px;">
              <p style="margin:0;font-family:'Courier New',monospace;font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:0.1em;">
                SYS.v1.0 // DOOMSDAY_PARLIAMENT_AUTH_MODULE
              </p>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;font-family:'Courier New',monospace;font-size:9px;color:rgba(255,255,255,0.15);letter-spacing:0.05em;">
                此為系統自動發送的驗證信件，請勿回覆。
              </p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
