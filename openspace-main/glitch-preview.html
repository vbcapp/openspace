<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故障線條風格預覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      text-align: center;
      color: #ff003c;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }

    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 420px;
      margin: 0 auto;
    }

    .preview-card {
      position: relative;
      background: rgba(20, 0, 0, 0.4);
      border: 1px solid rgba(255, 0, 60, 0.2);
      border-radius: 8px;
      padding: 24px 20px;
      overflow: hidden;
    }

    .preview-card__label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: #00f3ff;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .preview-card__title {
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .preview-card__desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ── 模擬個人頁名片 ── */
    .mock-profile {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(40, 0, 5, 0.6);
      border: 1px solid rgba(255, 0, 60, 0.15);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      min-height: 120px;
    }

    .mock-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255, 0, 60, 0.3);
      background: linear-gradient(135deg, #1a0005, #330011);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .mock-info {
      flex: 1;
    }

    .mock-name {
      font-family: 'Anton', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
    }

    .mock-id {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      color: #00f3ff;
      letter-spacing: 0.15em;
    }

    .mock-bio {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* ========================================
       風格 A：經典掃描線 — 單條亮線由上往下
       ======================================== */
    .glitch-line-a {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .glitch-line-a::before {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 0, 60, 0.6) 15%,
        rgba(255, 0, 60, 0.9) 50%,
        rgba(255, 0, 60, 0.6) 85%,
        transparent 100%
      );
      box-shadow:
        0 0 12px rgba(255, 0, 60, 0.5),
        0 0 30px rgba(255, 0, 60, 0.2);
      top: -3px;
      animation: scanline-a 3s linear infinite;
    }

    @keyframes scanline-a {
      0% { top: -3px; opacity: 0; }
      5% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ========================================
       風格 B：RGB 分裂帶 — 多色故障帶掃過
       ======================================== */
    .glitch-line-b {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .glitch-line-b::before {
      content: '';
      position: absolute;
      left: -5%;
      width: 110%;
      height: 8px;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(0, 243, 255, 0.4) 20%,
        rgba(255, 255, 255, 0.15) 40%,
        rgba(255, 0, 60, 0.5) 60%,
        rgba(255, 0, 230, 0.3) 80%,
        transparent 100%
      );
      top: -10px;
      animation: scanline-b 3s ease-in-out infinite;
    }

    .glitch-line-b::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(0, 243, 255, 0.6);
      box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
      top: -10px;
      animation: scanline-b-trail 3s ease-in-out infinite;
      animation-delay: 0.08s;
    }

    @keyframes scanline-b {
      0% { top: -10px; opacity: 0; transform: scaleX(1); }
      3% { opacity: 1; }
      50% { transform: scaleX(1.02); }
      92% { opacity: 1; }
      100% { top: calc(100% + 10px); opacity: 0; transform: scaleX(1); }
    }

    @keyframes scanline-b-trail {
      0% { top: -10px; opacity: 0; }
      3% { opacity: 1; }
      92% { opacity: 0.8; }
      100% { top: calc(100% + 10px); opacity: 0; }
    }

    /* ========================================
       風格 C：閃爍干擾帶 — 帶扭曲位移的粗條
       ======================================== */
    .glitch-line-c {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .glitch-line-c::before {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 12px;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        rgba(255, 0, 60, 0.15) 1px,
        rgba(255, 0, 60, 0.3) 2px,
        transparent 3px,
        transparent 4px
      );
      backdrop-filter: saturate(2) contrast(1.3);
      top: -14px;
      animation: scanline-c 3s linear infinite;
    }

    .glitch-line-c::after {
      content: '';
      position: absolute;
      left: -2%;
      width: 104%;
      height: 2px;
      background: rgba(255, 255, 255, 0.7);
      mix-blend-mode: overlay;
      box-shadow:
        0 -4px 8px rgba(255, 0, 60, 0.3),
        0 4px 8px rgba(0, 243, 255, 0.2);
      top: -14px;
      animation: scanline-c-core 3s linear infinite;
    }

    @keyframes scanline-c {
      0% {
        top: -14px;
        opacity: 0;
        transform: translateX(0);
      }
      5% { opacity: 1; }
      20% { transform: translateX(3px); }
      25% { transform: translateX(-2px); }
      35% { transform: translateX(1px); }
      40% { transform: translateX(-4px); }
      55% { transform: translateX(2px); }
      60% { transform: translateX(0); }
      70% { transform: translateX(-3px); }
      75% { transform: translateX(1px); }
      90% { opacity: 1; }
      100% {
        top: calc(100% + 14px);
        opacity: 0;
        transform: translateX(0);
      }
    }

    @keyframes scanline-c-core {
      0% {
        top: -14px;
        opacity: 0;
        transform: translateX(0);
      }
      5% { opacity: 0.8; }
      20% { transform: translateX(-3px); opacity: 1; }
      25% { transform: translateX(2px); opacity: 0.6; }
      35% { transform: translateX(-1px); opacity: 1; }
      40% { transform: translateX(4px); opacity: 0.7; }
      55% { transform: translateX(-2px); opacity: 1; }
      60% { transform: translateX(0); opacity: 0.5; }
      70% { transform: translateX(3px); opacity: 1; }
      75% { transform: translateX(-1px); }
      90% { opacity: 0.8; }
      100% {
        top: calc(100% + 14px);
        opacity: 0;
        transform: translateX(0);
      }
    }

    /* ── 控制按鈕 ── */
    .controls {
      text-align: center;
      margin-top: 32px;
      margin-bottom: 16px;
    }

    .controls button {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid rgba(255, 0, 60, 0.5);
      color: #ff003c;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .controls button:hover {
      background: rgba(255, 0, 60, 0.15);
      border-color: #ff003c;
    }

    .note {
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      margin-top: 24px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <h1>故障線條風格預覽</h1>

  <div class="preview-grid">

    <!-- 風格 A -->
    <div class="preview-card">
      <div class="preview-card__label">STYLE A</div>
      <div class="preview-card__title">經典掃描線</div>
      <div class="preview-card__desc">單條紅色亮線從上緩緩滑到下方，帶發光光暈，乾淨俐落</div>
      <div class="mock-profile">
        <div class="glitch-line-a"></div>
        <div class="mock-avatar">👤</div>
        <div class="mock-info">
          <div class="mock-id">#001 PLAYER</div>
          <div class="mock-name">末日倖存者</div>
          <div class="mock-bio">在末日中尋找希望的人</div>
        </div>
      </div>
    </div>

    <!-- 風格 B -->
    <div class="preview-card">
      <div class="preview-card__label">STYLE B</div>
      <div class="preview-card__title">RGB 分裂帶</div>
      <div class="preview-card__desc">多色漸層故障帶（青/白/紅/紫）掃過，後方拖著一條青色尾跡線</div>
      <div class="mock-profile">
        <div class="glitch-line-b"></div>
        <div class="mock-avatar">👤</div>
        <div class="mock-info">
          <div class="mock-id">#001 PLAYER</div>
          <div class="mock-name">末日倖存者</div>
          <div class="mock-bio">在末日中尋找希望的人</div>
        </div>
      </div>
    </div>

    <!-- 風格 C -->
    <div class="preview-card">
      <div class="preview-card__label">STYLE C</div>
      <div class="preview-card__title">閃爍干擾帶</div>
      <div class="preview-card__desc">較粗的條紋干擾帶，掃描時帶水平抖動位移，有 VHS 故障感</div>
      <div class="mock-profile">
        <div class="glitch-line-c"></div>
        <div class="mock-avatar">👤</div>
        <div class="mock-info">
          <div class="mock-id">#001 PLAYER</div>
          <div class="mock-name">末日倖存者</div>
          <div class="mock-bio">在末日中尋找希望的人</div>
        </div>
      </div>
    </div>

  </div>

  <div class="controls">
    <button onclick="restartAll()">重新播放全部</button>
  </div>

  <div class="note">每 3 秒自動循環 ‧ 點按上方按鈕可手動重播</div>

  <script>
    function restartAll() {
      const els = document.querySelectorAll('.glitch-line-a, .glitch-line-b, .glitch-line-c');
      els.forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight; // force reflow
        el.style.animation = '';

        // also restart pseudo-elements by re-adding class
        const cls = el.className;
        el.className = '';
        el.offsetHeight;
        el.className = cls;
      });
    }
  </script>

</body>
</html>
