<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入卡</title>
    <style>
        @font-face {
            font-family: 'Hatten';
            src: url('Fonts/HATTEN.TTF') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            position: relative;
            width: 280px;
            aspect-ratio: 640 / 605;
        }

        /* 紅色外框形狀 */
        .card-border {
            position: absolute;
            inset: 0;
            background: #e60012;
            clip-path: polygon(
                37% 0%,
                63% 0%,
                100% 86%,
                92% 100%,
                8% 100%,
                0% 86%
            );
        }

        /* 內層圖片區域（內縮產生邊框效果） */
        .card-image {
            position: absolute;
            inset: 0;
            clip-path: polygon(
                39% 2.8%,
                61% 2.8%,
                97% 86%,
                90% 97%,
                10% 97%,
                3% 86%
            );
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
        }

        /* 玩家編號 */
        .card-number {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Hatten', sans-serif;
            font-size: 2rem;
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(0, 0, 0, 0.95),
                2px 2px 6px rgba(0, 0, 0, 0.8),
                -1px -1px 4px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="card-border"></div>
        <div class="card-image">
            <img src="人物/001.png" alt="Player 001">
        </div>
        <div class="card-number">001</div>
    </div>

</body>
</html>
