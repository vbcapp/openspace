<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排列測試</title>
    <style>
        @font-face {
            font-family: 'Hatten';
            src: url('Fonts/HATTEN.TTF') format('truetype');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .grid {
            position: fixed;
            inset: 0;
        }

        .card {
            position: absolute;
        }

        /* 正立卡片疊在倒立上方 */
        .card-upright { z-index: 2; }
        .card-inverted { z-index: 1; }

        .card .border {
            position: absolute;
            inset: 0;
            background: #e60012;
        }

        .card .image {
            position: absolute;
            inset: 0;
        }

        .card .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            filter: brightness(0.55) saturate(1.3);
        }

        .card .number {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Hatten', sans-serif;
            color: #fff;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.95);
            letter-spacing: 1px;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 正立卡片 — 與 登入卡.html 相同 */
        .card-upright .border {
            clip-path: polygon(37% 0%, 63% 0%, 100% 86%, 92% 100%, 8% 100%, 0% 86%);
        }
        .card-upright .image {
            clip-path: polygon(39% 2.8%, 61% 2.8%, 97% 86%, 90% 97%, 10% 97%, 3% 86%);
        }

        /* 倒立卡片 — 與 登入卡倒立.html 相同 */
        .card-inverted .border {
            clip-path: polygon(8% 0%, 92% 0%, 100% 14%, 63% 100%, 37% 100%, 0% 14%);
        }
        .card-inverted .image {
            clip-path: polygon(10% 3%, 90% 3%, 97% 14%, 61% 97.2%, 39% 97.2%, 3% 14%);
        }
    </style>
</head>
<body>

    <div class="grid" id="grid"></div>

    <script>
        (() => {
            const grid = document.getElementById('grid');

            /* ---- 參數 ---- */
            const ROWS    = 7;
            const COLS    = 19;
            const GAP     = 0.35;                // 左右長邊水平間距 (vw)
            const ROW_GAP = 0.2;                 // 排與排之間垂直間距 (vw)
            const MARGIN  = 2;

            const vhVw = window.innerHeight / window.innerWidth * 100;

            // 自動計算卡片寬度：取水平 / 垂直兩個限制的較小值
            const W_h = (100 - 2 * MARGIN - (COLS - 1) * GAP) / (1 + (COLS - 1) * 0.63);
            const W_v = (vhVw - 2 * MARGIN - (ROWS - 1) * ROW_GAP) / (ROWS * 1.14 * 605 / 640);
            const W    = Math.min(W_h, W_v);
            const H    = W * 605 / 640;
            const SX   = W * 0.63 + GAP;         // 水平步距
            const SY   = 1.14 * H + ROW_GAP;     // 垂直步距（每排高 1.14H + 間距）
            const FONT = W * 0.11;

            // 整體置中
            const totalW = (COLS - 1) * SX + W;
            const totalH = (ROWS - 1) * SY + 1.14 * H;
            const startX = (100 - totalW) / 2;
            const startYUp = (vhVw - totalH) / 2 + 0.14 * H;

            /*  排列規則：
                第 1 排 (r=0)：倒立開始  I U I U I …
                第 2 排 (r=1)：正立開始  U I U I U …
                第 3 排 (r=2)：倒立開始  I U I U I …
                以此類推（奇偶交替）               */

            for (let r = 0; r < ROWS; r++) {
                const yUp  = startYUp + r * SY;
                const yInv = yUp - 0.14 * H;

                for (let i = 0; i < COLS; i++) {
                    const inv = ((r + i) % 2 === 0);
                    const x   = startX + i * SX;
                    const y   = inv ? yInv : yUp;

                    const card = document.createElement('div');
                    card.className = `card ${inv ? 'card-inverted' : 'card-upright'}`;
                    card.style.cssText = `left:${x}vw;top:${y}vw;width:${W}vw;height:${H}vw;`;

                    card.innerHTML =
                        '<div class="border"></div>' +
                        '<div class="image">' +
                            '<img src="人物/001.png" alt="001" onerror="this.parentElement.style.display=\'none\'">' +
                        '</div>' +
                        `<div class="number" style="font-size:${FONT}vw">001</div>`;

                    grid.appendChild(card);
                }
            }
        })();
    </script>

</body>
</html>
